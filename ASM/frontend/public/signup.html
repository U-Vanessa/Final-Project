<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="./Logo 2.png" type="image/png">
    <title>Sign Up | ASM System</title>
    
    <style>
        /* ===== VARIABLES & RESET ===== */
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --accent: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #1e293b;
            --light: #f8fafc;
            --gray: #64748b;
            --radius: 16px;
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            color: var(--dark);
        }
        
        /* ===== MAIN CONTAINER ===== */
        .signup-container {
            width: 100%;
            max-width: 1100px;
            min-height: 650px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: var(--radius);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: floatIn 0.8s ease-out;
        }
        
        /* ===== LEFT SIDE - HERO ===== */
        .hero-side {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .hero-side::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            top: -100px;
            left: -100px;
        }
        
        .hero-side::after {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
            bottom: -50px;
            right: -50px;
        }
        
        /* ===== CENTERED CONTENT ===== */
        .centered-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            max-width: 400px;
            z-index: 2;
        }
        
        .logo-display {
            margin-bottom: 30px;
        }
        
        .logo-3d {
            width: 140px;
            height: 140px;
            background: white;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
            transform-style: preserve-3d;
            animation: floatLogo 6s ease-in-out infinite;
            padding: 20px;
        }
        
        .logo-3d img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2));
        }
        
        .logo-fallback {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.5rem;
            font-weight: 800;
        }
        
        .hero-title {
            margin-bottom: 25px;
        }
        
        .hero-title h1 {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            letter-spacing: -0.5px;
            line-height: 1.1;
        }
        
        .hero-title .acronym {
            font-size: 1.1rem;
            opacity: 0.9;
            letter-spacing: 3px;
            font-weight: 500;
            margin-top: 5px;
        }
        
        .hero-text {
            font-size: 1.2rem;
            line-height: 1.7;
            opacity: 0.95;
        }
        
        .hero-text p {
            margin-bottom: 15px;
        }
        
        .hero-text p:last-child {
            margin-bottom: 0;
        }
        
        /* ===== RIGHT SIDE - SIGNUP FORM ===== */
        .signup-side {
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .signup-header {
            margin-bottom: 40px;
            width: 100%;
            text-align: center;
        }
        
        .signup-header h2 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .signup-header p {
            color: var(--gray);
            font-size: 1.1rem;
        }
        
        /* ===== FORM CONTAINER ===== */
        .form-container {
            width: 100%;
            max-width: 450px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .form-group {
            margin-bottom: 25px;
            position: relative;
        }
        
        .form-group.full-width {
            grid-column: span 2;
        }
        
        .form-label {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 8px;
        }
        
        .form-label .required {
            color: var(--danger);
            margin-left: 3px;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .form-input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            background: var(--light);
            transition: var(--transition);
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            background: white;
        }
        
        .input-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
            font-size: 1.2rem;
        }
        
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--gray);
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
            padding: 5px;
        }
        
        .password-toggle:hover {
            color: var(--primary);
        }
        
        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
        }
        
        .strength-bar {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        
        .strength-text {
            font-size: 0.8rem;
            margin-top: 5px;
            color: var(--gray);
        }
        
        /* ===== CHECKBOX ===== */
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 25px;
        }
        
        .checkbox-input {
            width: 20px;
            height: 20px;
            margin-top: 3px;
            accent-color: var(--primary);
            cursor: pointer;
        }
        
        .checkbox-label {
            font-size: 0.9rem;
            color: var(--gray);
            line-height: 1.5;
        }
        
        .checkbox-label a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        
        .checkbox-label a:hover {
            text-decoration: underline;
        }
        
        /* ===== CENTERED BUTTON ===== */
        .button-group {
            display: flex;
            justify-content: center;
            margin-top: 30px;
            width: 100%;
        }
        
        .submit-btn {
            padding: 18px 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-width: 200px;
        }
        
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(99, 102, 241, 0.4);
        }
        
        .submit-btn:active {
            transform: translateY(-1px);
        }
        
        .submit-btn.secondary {
            background: linear-gradient(135deg, var(--accent), #0ea5e9);
            box-shadow: 0 10px 25px rgba(6, 182, 212, 0.3);
        }
        
        .submit-btn.secondary:hover {
            box-shadow: 0 15px 35px rgba(6, 182, 212, 0.4);
        }
        
        .submit-btn .btn-icon {
            font-size: 1.2rem;
        }
        
        /* ===== LOGIN LINK ===== */
        .login-link {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
            color: var(--gray);
        }
        
        .login-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        /* ===== ANIMATIONS ===== */
        @keyframes floatIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        @keyframes floatLogo {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-15px) rotate(2deg);
            }
        }
        
        @keyframes ripple {
            0% {
                transform: scale(0, 0);
                opacity: 1;
            }
            20% {
                transform: scale(25, 25);
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: scale(40, 40);
            }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        
        /* ===== VALIDATION STATES ===== */
        .form-input.valid {
            border-color: var(--success);
        }
        
        .form-input.invalid {
            border-color: var(--danger);
        }
        
        .validation-message {
            font-size: 0.8rem;
            margin-top: 5px;
            display: none;
        }
        
        .validation-message.valid {
            color: var(--success);
            display: block;
        }
        
        .validation-message.invalid {
            color: var(--danger);
            display: block;
        }
        
        /* ===== RESPONSIVE ===== */
        @media (max-width: 968px) {
            .signup-container {
                grid-template-columns: 1fr;
                height: auto;
                max-height: 95vh;
                overflow-y: auto;
            }
            
            .hero-side, .signup-side {
                padding: 40px 30px;
            }
            
            .hero-title h1 {
                font-size: 2.2rem;
            }
            
            .signup-header h2 {
                font-size: 2rem;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .form-group.full-width {
                grid-column: span 1;
            }
        }
        
        @media (max-width: 576px) {
            .hero-title h1 {
                font-size: 1.8rem;
            }
            
            .signup-header h2 {
                font-size: 1.8rem;
            }
        }
    </style>
    
    <!-- Add Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="signup-container">
        <!-- LEFT: HERO SECTION -->
        <div class="hero-side">
            <div class="centered-content">
                <div class="logo-display">
                    <div class="logo-3d">
                        <img src="./Logo 1.png" alt="ASM Logo" id="logoImg" onerror="showFallbackLogo()">
                        <div class="logo-fallback" id="fallbackLogo" style="display: none;">
                            ASM
                        </div>
                    </div>
                    
                    <div class="hero-title">
                        <h1>Join ASM</h1>
                        <div class="acronym">ASSET & SUPPORT MANAGEMENT</div>
                    </div>
                </div>
                
                <div class="hero-text">
                    <p>Create your account and start managing</p>
                    <p>your ICT assets efficiently with our</p>
                    <p>comprehensive solution.</p>
                </div>
            </div>
        </div>
        
        <!-- RIGHT: SIGNUP FORM -->
        <div class="signup-side">
            <div class="signup-header">
                <h2>Create Account</h2>
                <p>Join The ASM</p>
            </div>
            
            <div class="form-container">
                <form id="signupForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">First Name<span class="required">*</span></label>
                            <div class="input-wrapper">
                                <input 
                                    type="text" 
                                    class="form-input" 
                                    id="firstName"
                                    placeholder="Enter your first name"
                                    required
                                >
                            </div>
                            <div class="validation-message" id="firstNameMsg"></div>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Last Name<span class="required">*</span></label>
                            <div class="input-wrapper">
                                <input 
                                    type="text" 
                                    class="form-input" 
                                    id="lastName"
                                    placeholder="Enter your last name"
                                    required
                                >
                            </div>
                            <div class="validation-message" id="lastNameMsg"></div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Email Address<span class="required">*</span></label>
                        <div class="input-wrapper">
                            <input 
                                type="email" 
                                class="form-input" 
                                id="email"
                                placeholder="Enter your work email"
                                required
                            >
                        </div>
                        <div class="validation-message" id="emailMsg"></div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Company/Organization</label>
                        <div class="input-wrapper">
                            <input 
                                type="text" 
                                class="form-input" 
                                id="company"
                                placeholder="Enter company name"
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Position</label>
                        <div class="input-wrapper">
                            <input 
                                type="text" 
                                class="form-input" 
                                id="position"
                                placeholder="Enter your position"
                            >
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Password<span class="required">*</span></label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input 
                                type="password" 
                                class="form-input" 
                                id="password"
                                placeholder="Create a strong password"
                                minlength="8"
                                required
                            >
                            <button type="button" class="password-toggle" id="togglePassword">
                                👁️
                            </button>
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar" id="strengthBar"></div>
                        </div>
                        <div class="strength-text" id="strengthText">Password strength: Very weak</div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Confirm Password<span class="required">*</span></label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input 
                                type="password" 
                                class="form-input" 
                                id="confirmPassword"
                                placeholder="Re-enter your password"
                                required
                            >
                            <button type="button" class="password-toggle" id="toggleConfirmPassword">
                                👁️
                            </button>
                        </div>
                        <div class="validation-message" id="confirmPasswordMsg"></div>
                    </div>
                    
                    <div class="checkbox-group">
                        <input type="checkbox" class="checkbox-input" id="terms" required>
                        <label class="checkbox-label" for="terms">
                            I agree to the <a href="https://docs.google.com/document/d/1KyaDIMSdX4WoLciCt6j1FGWyCbiT97gGavaaygbSNQo/edit?usp=sharing" target="Doc">Terms of Service</a> and 
                            <a href="https://docs.google.com/document/d/180GxIt3rHhisreE1aiRxjGpXdHTZ0ifRbBDFUL64vf4/edit?usp=sharing" target="Doc">Privacy Policy</a>. I understand that ASM 
                            will process my information in accordance with these policies.
                        </label>
                    </div>
                    
                    <!-- CENTERED BUTTON -->
                    <div class="button-group">
                        <button type="submit" class="submit-btn" id="submitBtn">
                            <span>Create Account</span>
                        </button>
                    </div>
                </form>
                
                <div class="login-link">
                    Already have an account? 
                    <a href="index.html">Sign In</a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // ===== LOGO FALLBACK =====
        function showFallbackLogo() {
            const logoImg = document.getElementById('logoImg');
            const fallback = document.getElementById('fallbackLogo');
            
            logoImg.style.display = 'none';
            fallback.style.display = 'flex';
            
            const paths = ['./Logo 2.png', 'Logo 1.png', 'Logo 2.png'];
            let currentPath = 0;
            
            const tryLogo = () => {
                if (currentPath < paths.length) {
                    const testImg = new Image();
                    testImg.src = paths[currentPath];
                    testImg.onload = () => {
                        logoImg.src = paths[currentPath];
                        logoImg.style.display = 'block';
                        fallback.style.display = 'none';
                    };
                    testImg.onerror = () => {
                        currentPath++;
                        setTimeout(tryLogo, 200);
                    };
                }
            };
            
            setTimeout(tryLogo, 500);
        }
        
        // ===== PASSWORD VISIBILITY TOGGLE =====
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                this.innerHTML = '🔒';
            } else {
                passwordInput.type = 'password';
                this.innerHTML = '👁️';
            }
        });
        
        document.getElementById('toggleConfirmPassword').addEventListener('click', function() {
            const confirmInput = document.getElementById('confirmPassword');
            if (confirmInput.type === 'password') {
                confirmInput.type = 'text';
                this.innerHTML = '🔒';
            } else {
                confirmInput.type = 'password';
                this.innerHTML = '👁️';
            }
        });
        
        // ===== PASSWORD STRENGTH CHECKER =====
        document.getElementById('password').addEventListener('input', function() {
            const password = this.value;
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');
            
            let strength = 0;
            let color = '#ef4444';
            let text = 'Very weak';
            
            // Check password criteria
            if (password.length >= 8) strength += 25;
            if (/[A-Z]/.test(password)) strength += 25;
            if (/[0-9]/.test(password)) strength += 25;
            if (/[^A-Za-z0-9]/.test(password)) strength += 25;
            
            // Update strength indicator
            strengthBar.style.width = strength + '%';
            
            if (strength >= 75) {
                color = '#10b981';
                text = 'Strong';
            } else if (strength >= 50) {
                color = '#f59e0b';
                text = 'Moderate';
            } else if (strength >= 25) {
                color = '#f59e0b';
                text = 'Weak';
            }
            
            strengthBar.style.background = color;
            strengthText.textContent = `Password strength: ${text}`;
            strengthText.style.color = color;
        });
        
        // ===== FORM VALIDATION =====
        const form = document.getElementById('signupForm');
        const firstName = document.getElementById('firstName');
        const lastName = document.getElementById('lastName');
        const email = document.getElementById('email');
        const password = document.getElementById('password');
        const confirmPassword = document.getElementById('confirmPassword');
        const terms = document.getElementById('terms');
        
        // Real-time validation
        firstName.addEventListener('blur', validateFirstName);
        lastName.addEventListener('blur', validateLastName);
        email.addEventListener('blur', validateEmail);
        confirmPassword.addEventListener('input', validateConfirmPassword);
        
        function validateFirstName() {
            const msg = document.getElementById('firstNameMsg');
            if (firstName.value.trim().length < 2) {
                showValidation(firstName, msg, 'Please enter a valid first name', false);
                return false;
            } else {
                showValidation(firstName, msg, 'Looks good!', true);
                return true;
            }
        }
        
        function validateLastName() {
            const msg = document.getElementById('lastNameMsg');
            if (lastName.value.trim().length < 2) {
                showValidation(lastName, msg, 'Please enter a valid last name', false);
                return false;
            } else {
                showValidation(lastName, msg, 'Looks good!', true);
                return true;
            }
        }
        
        function validateEmail() {
            const msg = document.getElementById('emailMsg');
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            if (!emailRegex.test(email.value)) {
                showValidation(email, msg, 'Please enter a valid email address', false);
                return false;
            } else {
                showValidation(email, msg, 'Valid email format', true);
                return true;
            }
        }
        
        function validateConfirmPassword() {
            const msg = document.getElementById('confirmPasswordMsg');
            
            if (confirmPassword.value !== password.value) {
                showValidation(confirmPassword, msg, 'Passwords do not match', false);
                return false;
            } else {
                showValidation(confirmPassword, msg, 'Passwords match', true);
                return true;
            }
        }
        
        function showValidation(input, messageElement, message, isValid) {
            input.classList.remove('valid', 'invalid');
            messageElement.classList.remove('valid', 'invalid');
            
            if (isValid) {
                input.classList.add('valid');
                messageElement.classList.add('valid');
            } else {
                input.classList.add('invalid');
                messageElement.classList.add('invalid');
            }
            
            messageElement.textContent = message;
        }
        
        // ===== FORM SUBMISSION =====
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Validate all fields
            const isFirstNameValid = validateFirstName();
            const isLastNameValid = validateLastName();
            const isEmailValid = validateEmail();
            const isPasswordValid = password.value.length >= 8;
            const isConfirmValid = validateConfirmPassword();
            const isTermsAccepted = terms.checked;
            
            if (!isFirstNameValid || !isLastNameValid || !isEmailValid || 
                !isPasswordValid || !isConfirmValid || !isTermsAccepted) {
                showNotification('Please fill all required fields correctly', 'error');
                return;
            }
            
            // Show loading state
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span>Creating account...</span>';
            submitBtn.disabled = true;
            
            // Simulate API call
            await new Promise(resolve => setTimeout(resolve, 2000));
            
            // Success animation
            submitBtn.style.background = 'linear-gradient(135deg, var(--success), #34d399)';
            submitBtn.innerHTML = '<span>✓ Account Created!</span>';
            
            // Show success message
            showNotification('Account created successfully! Redirecting to login...', 'success');
            
            // Redirect to login after delay
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 3000);
        });
        
        // ===== NOTIFICATION SYSTEM =====
        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 20px;
                border-radius: 12px;
                box-shadow: var(--shadow);
                z-index: 1000;
                animation: floatIn 0.5s ease-out;
                max-width: 300px;
                color: white;
                font-weight: 500;
            `;
            
            const colors = {
                success: '#10b981',
                error: '#ef4444',
                info: '#3b82f6'
            };
            
            notification.style.background = colors[type] || colors.info;
            
            notification.innerHTML = `
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span style="font-size: 1.2rem;">${type === 'success' ? '✓' : type === 'error' ? '⚠' : 'ℹ'}</span>
                    <div>${message}</div>
                </div>
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'floatIn 0.5s ease-out reverse';
                setTimeout(() => notification.remove(), 500);
            }, 4000);
        }
        
        // ===== INITIALIZE =====
        document.addEventListener('DOMContentLoaded', function() {
            const logoImg = document.getElementById('logoImg');
            logoImg.onerror = showFallbackLogo;
            
            // Focus first name field
            firstName.focus();
        });
    </script>
</body>
</html>
